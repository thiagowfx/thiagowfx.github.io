# yaml-language-server: $schema=../../schemas/hugo.json
baseURL: http://localhost/
defaultContentLanguage: en
enableGitInfo: true
languages:
  en:
    label: English
    weight: 1
  pt:
    label: Português
    weight: 2
    contentDir: content/pt
  it:
    label: Italiano
    weight: 3
    contentDir: content/it
copyright: |
  © 2013 - 2026 Thiago Perrotta ·
    [some rights reserved](https://creativecommons.org/licenses/by-nc-sa/4.0/) ·
    a fork of [hugo ʕ•ᴥ•ʔ bear](https://github.com/janraasch/hugo-bearblog/)
locale: en-us
enableRobotsTxt: true
buildDrafts: true
markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
  tableOfContents:
    startLevel: 2
    endLevel: 4
rssLimit: 40
title: ¬ just serendipity 🍀
menu:
  main:
    - name: ★
      url: /tags/bestof/
      weight: 1
      params:
        emoji: ⭐
    - name: 🔍
      url: /search/
      weight: 2
    - name: Blog
      url: /posts/
      weight: 3
    - name: More
      url: "#"
      weight: 4
      params:
        dropdown: true
    - name: Projects
      url: /projects/
      weight: 40
      parent: More
    - name: Blogroll
      url: /blogroll/
      weight: 41
      parent: More
    - name: 🏷️ Tags
      url: /tags/
      weight: 42
      parent: More
    - name: Serenity
      url: /tags/serenity/
      weight: 43
      parent: More
    - name: 📂 Categories
      url: /categories/
      weight: 44
      parent: More
    - name: 💻 Coding
      url: /categories/coding/
      weight: 45
      parent: More
    - name: 🕸️ Graph
      url: /graph/
      weight: 46
      parent: More
    - name: 🎲 Random
      url: /random/
      weight: 47
      parent: More
    - name: 📻 Radio
      url: /radio/
      weight: 48
      parent: More
    - name: 🍅 Pomodoro
      url: /pomodoro/
      weight: 49
      parent: More
params:
  author:
    email: serendipity@perrotta.dev
    name: Thiago Perrotta
    nickname: thiagowfx
  description: not just serendipity, the blog from Thiago Perrotta
  seoTitle: not just serendipity
  appleTouchIcon: apple-touch-icon.webp
  favicon: favicon.ico
  oldEntryWarningYears: 1
  jwzPreviouslyLimit: 5
  featuredPostsLimit: 3
permalinks:
  posts: "/:year/:month/:slug/"
taxonomies:
  tag: tags
  category: categories

# llms.txt BEGIN
# layouts/_default/home.llms.txt
mediaTypes:
  text/markdown:
    suffixes:
      - md
  application/opml:
    suffixes:
      - opml
outputFormats:
  Markdown:
    mediaType: text/markdown
    baseName: index
    isPlainText: true
  llms:
    mediaType: text/plain
    baseName: llms
    isPlainText: true
  sitemapmd:
    mediaType: text/markdown
    baseName: sitemap
    isPlainText: true
  OPML:
    mediaType: application/opml
    baseName: blogroll
    isPlainText: false
  search:
    mediaType: application/json
    baseName: index
    isPlainText: true
  graphdata:
    mediaType: application/json
    baseName: graph
    isPlainText: true
outputs:
  home:
    - HTML
    - RSS
    - llms
    - sitemapmd
    - OPML
  page:
    - HTML
    - Markdown
# llms.txt END
